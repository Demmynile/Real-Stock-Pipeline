services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      kafka:
        condition: service_started
    command: >
      bash -c "cub kafka-ready -b kafka:9092 1 60 &&
      kafka-topics --create --if-not-exists --topic events --bootstrap-server kafka:9092 --replication-factor 1 --partitions 1"

  postgres:
    image: postgres:15
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  spark:
    build: ./spark
    depends_on:
      kafka:
        condition: service_started
      kafka-init:
        condition: service_completed_successfully
      postgres:
        condition: service_started
    restart: on-failure
    env_file:
      - .env
    volumes:
      - ./spark_jobs:/opt/spark_jobs
    command: >
      /opt/spark/bin/spark-submit
      --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.0
      /opt/spark_jobs/kakfa_to_postgres.py

  ingestion:
    build: ./ingestion
    depends_on:
      kafka:
        condition: service_started
      kafka-init:
        condition: service_completed_successfully
    restart: on-failure
    env_file:
      - .env

  api:
    build: ./api
    depends_on:
      - postgres
    env_file:
      - .env
    ports:
      - "8000:8000"